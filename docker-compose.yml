version: '3.8'
services:
  db:
    image: postgres:latest
    container_name: exam_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: examdb
    ports:
      - "5433:5432"

  redis:
    image: redis:latest
    container_name: exam_redis
    ports:
      - "6379:6379"